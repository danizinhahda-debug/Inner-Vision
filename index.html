<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INNER VISION</title>
    <style>
        :root {
            --primary: #8a2be2;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            background: var(--card);
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid #222;
        }

        h1 {
            font-size: 1.4rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            color: var(--text);
            font-weight: 300;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        #preview-container {
            width: 100%;
            height: 220px;
            border: 2px dashed #333;
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        #preview-img {
            max-width: 100%;
            max-height: 100%;
            display: none;
            border-radius: 10px;
        }

        .btn-upload {
            background: var(--primary);
            color: white;
            padding: 18px 30px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-upload:active { transform: scale(0.97); opacity: 0.8; }

        #status {
            margin: 20px 0;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--primary);
            min-height: 24px;
        }

        #resultado {
            margin-top: 10px;
            padding: 20px;
            background: #000;
            border-radius: 15px;
            display: none;
            text-align: left;
            border: 1px solid #222;
        }
